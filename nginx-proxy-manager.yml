services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    env_file:
      - stack.env
    ports:
      - "80:80"
      - "81:81"        # Admin UI
      - "443:443"
    volumes:
      - /mnt/docker/nginxproxymanager/data:/data
      - /mnt/docker/nginxproxymanager/letsencrypt:/etc/letsencrypt
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:81"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
        window: 2m
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
      resources:
        limits:
          memory: 512M
          cpus: "1.00"
        reservations:
          memory: 256M
    networks:
      - media-net
      - drunk-app-stack_drunk-net   # connect to your webapp overlay network

networks:
  media-net:
    external: true
  drunk-app-stack_drunk-net:
    external: true
