# Nginx Proxy Manager — standalone stack
#
# Extracted from jellyfin-media-stack. Uses existing NFS bind-mount paths
# so all proxy hosts, SSL certs, and settings are preserved.
#
# Deploy:
#   docker stack deploy -c npm-stack.yml npm
#
# Admin UI at http://<manager-ip>:81

networks:
  proxy-net:
    external: true
  media-net:
    external: true

services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - /mnt/docker/nginxproxymanager/data:/data
      - /mnt/docker/nginxproxymanager/letsencrypt:/etc/letsencrypt
    networks:
      - proxy-net
      - media-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:81"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: any
        delay: 10s
        window: 2m
      update_config:
        order: start-first
        parallelism: 1
        delay: 10s
      resources:
        limits:
          memory: 512M
          cpus: "1.00"
        reservations:
          memory: 256M
